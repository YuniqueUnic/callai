}

}

.banner {

}

.btn-icon {

.wheel-labels {
  position: absolute; inset: 0; pointer-events: none; z-index: 3;
  transition: transform 4s cubic-bezier(.15,.8,.1,1);
}
.wheel-label {
  position: absolute; inset: 0;
  display: flex; justify-content: center; align-items: flex-start;

}
.wheel-label > span {
  display: block;
  max-width: 42%;

  font-size: 12px;

  line-height: 1.15;
  color: #fff;
  text-shadow:
    0 1px 0 rgba(0,0,0,.55),
    0 0 4px rgba(0,0,0,.45),
    0 0 1px #000;
  word-break: break-word;
}

  <script type="text/babel" data-presets="react-classic">

const { useState, useEffect, useRef, useCallback, useMemo } = React;

async function waitCallai(timeoutMs) {
  const t0 = Date.now();
  while (Date.now() - t0 < (timeoutMs || 2500)) {
    if (window.callai && (window.callai.ready || window.callai.storage || window.callai.invoke)) {
      return window.callai;
    }
    await new Promise((r) => setTimeout(r, 40));
  }
  const mem = {};
  return {
    ready: false,
    launchParams: {},
    getLaunchParams: function () { return this.launchParams || {}; },
    storage: {
      async get(k) {
        if (k in mem) return mem[k];
        try {
          const raw = localStorage.getItem("callai-preview:" + k);
          return raw == null ? null : JSON.parse(raw);
        } catch (e) { return null; }
      },
      async set(k, v) {
        mem[k] = v;
        try { localStorage.setItem("callai-preview:" + k, JSON.stringify(v)); } catch (e) {}
      },
    },
    timer: {
      async now() {
        const d = new Date();
        const iso = d.toISOString();
        return { iso, now: iso, ts: d.getTime() };
      },
    },
    notification: {
      async show(a, b) {
        const title = typeof a === "string" ? a : (a && a.title) || "callai";
        const body = typeof a === "string" ? (b || "") : (a && a.body) || "";
        console.info("[notify]", title, body);
      },
    },
  };
}

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function asBool(v, fallback) {
  if (v === true || v === "1" || v === "true" || v === "yes") return true;
  if (v === false || v === "0" || v === "false" || v === "no") return false;
  return fallback;
}

function usePluginSettings(api, storageKey, defaults) {
  const [saved, setSaved] = useState(defaults);
  const [override, setOverride] = useState({});
  const [ready, setReady] = useState(false);

  const applyOverride = useCallback((p) => {
    setOverride(p && typeof p === "object" && !Array.isArray(p) ? p : {});
  }, []);

  useEffect(() => {
    if (!api) return;
    let alive = true;
    (async () => {
      const raw = (await api.storage.get(storageKey)) || {};
      if (!alive) return;
      setSaved(Object.assign({}, defaults, raw));
      const lp = (api.getLaunchParams && api.getLaunchParams()) || api.launchParams || {};
      applyOverride(lp);
      setReady(true);
    })();
    function onLaunch(ev) { applyOverride((ev && ev.detail) || {}); }
    window.addEventListener("callai:launch-params", onLaunch);
    return () => {
      alive = false;
      window.removeEventListener("callai:launch-params", onLaunch);
    };
  }, [api, storageKey, applyOverride]);

  const effective = useMemo(
    () => Object.assign({}, defaults, saved, override),
    [defaults, saved, override],
  );

  const saveSettings = useCallback(async (next) => {
    const merged = Object.assign({}, defaults, next);
    setSaved(merged);
    if (api) await api.storage.set(storageKey, merged);
  }, [api, storageKey, defaults]);

  const patchSettings = useCallback(async (partial) => {
    await saveSettings(Object.assign({}, saved, partial));
  }, [saved, saveSettings]);

  return { saved, override, effective, ready, saveSettings, patchSettings };
}

function OverrideBanner({ override, keys }) {
  const entries = Object.entries(override || {}).filter(([k, v]) => {
    if (v == null || v === "") return false;
    if (keys && keys.length && !keys.includes(k)) return false;
    return true;
  });
  if (!entries.length) return null;
  return (
    <span className="tag warn">
      闹钟覆盖 {entries.map(([k, v]) => k + "=" + String(v)).join(" · ")}
    </span>
  );
}

function IconBtn({ className, onClick, title, children, disabled }) {
  return (
    <button
      type="button"
      className={"btn btn-icon " + (className || "")}
      onClick={onClick}
      title={title}
      aria-label={title}
      disabled={disabled}
    >
      {children}
    </button>
  );
}


const LISTS_KEY = "meal-spin:lists";
const SETTINGS_KEY = "settings";
const DEFAULT_LISTS = {
  food: ["盖饭", "面食", "轻食沙拉", "火锅", "汉堡", "寿司", "粥", "自己做"],
  drink: ["美式", "拿铁", "绿茶", "乌龙", "气泡水", "鲜榨果汁", "牛奶", "白开水"],
};
const DEFAULTS = {
  mode: "food",
  spinSeconds: 4,
  autoNotify: true,
  lockMode: false,
};

function normalizeMode(v) {
  const s = String(v || "").trim().toLowerCase();
  if (["drink", "drinks", "喝", "喝什么", "beverage"].includes(s)) return "drink";
  if (["food", "foods", "吃", "吃什么", "meal", "eat"].includes(s)) return "food";
  return null;
}

function App() {
  const [api, setApi] = useState(null);
  const [lists, setLists] = useState(DEFAULT_LISTS);
  const s = usePluginSettings(api, SETTINGS_KEY, DEFAULTS);
  const [draft, setDraft] = useState("");
  const [rot, setRot] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [result, setResult] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [listsReady, setListsReady] = useState(false);

  const mode = useMemo(() => {
    const fromAlias = normalizeMode(s.override.page || s.override.view || s.override.tab);
    return normalizeMode(fromAlias || s.effective.mode) || "food";
  }, [s.effective.mode, s.override.page, s.override.view, s.override.tab, s.override.mode]);

  const locked = asBool(s.effective.lockMode, false);

  useEffect(() => {
    let alive = true;
    (async () => {
      const c = await waitCallai();
      if (!alive) return;
      setApi(c);
      const saved = await c.storage.get(LISTS_KEY);
      if (saved && typeof saved === "object") {
        setLists({
          food: Array.isArray(saved.food) && saved.food.length ? saved.food : DEFAULT_LISTS.food,
          drink: Array.isArray(saved.drink) && saved.drink.length ? saved.drink : DEFAULT_LISTS.drink,
        });
      }
      setListsReady(true);
    })();
    return () => { alive = false; };
  }, []);

  const items = lists[mode] || [];
  const persistLists = async (next) => {
    setLists(next);
    if (api) await api.storage.set(LISTS_KEY, next);
  };
  const add = async () => {
    const t = draft.trim();
    if (!t || items.includes(t)) { setDraft(""); return; }
    setDraft("");
    await persistLists({ ...lists, [mode]: [...items, t] });
  };
  const spin = async () => {
    if (!items.length || spinning) return;
    setSpinning(true);
    setResult("");
    const idx = Math.floor(Math.random() * items.length);
    const turns = 5 + Math.random() * 3;
    const slice = 360 / items.length;
    // Align mid-sector under top pin (0deg at top for conic-gradient)
    const target = rot + turns * 360 + (360 - (idx * slice + slice / 2));
    setRot(target);
    const ms = Math.max(2, Number(s.effective.spinSeconds) || 4) * 1000 + 100;
    setTimeout(async () => {
      const pick = items[idx];
      setResult(pick);
      setSpinning(false);
      if (asBool(s.effective.autoNotify, true) && api) {
        await api.notification.show({
          title: mode === "food" ? "今天吃什么" : "今天喝什么",
          body: (mode === "food" ? "今天吃：" : "今天喝：") + pick,
        });
      }
    }, ms);
  };

  const colors = ["#19c8b9","#6fba2c","#f5c31c","#e05a5a","#7aa2f7","#c58bff","#ff9f6b","#5ec8e8"];
  const gradient = items.length
    ? items.map((_, i) => {
        const a = (i / items.length) * 360;
        const b = ((i + 1) / items.length) * 360;
        return colors[i % colors.length] + " " + a + "deg " + b + "deg";
      }).join(", ")
    : "#efe8d4 0deg 360deg";
  const prefix = mode === "food" ? "今天吃：" : "今天喝：";
  const spinSec = Math.max(2, Number(s.effective.spinSeconds) || 4);

  return (
    <div className="app">
      <div className="header">
        <h1>今天吃喝什么</h1>
        <p>设置 mode=food|drink；不同闹钟 ENV 覆盖即可打开不同页</p>
      </div>
      <div className="banner">
        <span className="tag">mode={mode}</span>
        <OverrideBanner override={s.override} keys={["mode","page","spinSeconds","autoNotify","lockMode"]} />
        <IconBtn className="ghost" title={showSettings ? "收起设置" : "设置"} onClick={() => setShowSettings((v) => !v)}>
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="3.2" stroke="currentColor" strokeWidth="2"/><path d="M12 3.5v2.2M12 18.3v2.2M3.5 12h2.2M18.3 12h2.2M6.2 6.2l1.6 1.6M16.2 16.2l1.6 1.6M17.8 6.2l-1.6 1.6M7.8 16.2l-1.6 1.6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
        </IconBtn>
      </div>

      <div className="seg">
        <button className={mode === "food" ? "on" : ""} disabled={locked && mode !== "food"}
          onClick={() => !locked && s.patchSettings({ mode: "food" })}>吃什么</button>
        <button className={mode === "drink" ? "on" : ""} disabled={locked && mode !== "drink"}
          onClick={() => !locked && s.patchSettings({ mode: "drink" })}>喝什么</button>
      </div>

      <div className="wheel-wrap">
        <div className="wheel-pin" />
        <div className="wheel" style={{
          transform: "rotate(" + rot + "deg)",
          background: "conic-gradient(" + gradient + ")",
          transitionDuration: spinSec + "s",
        }} />
        <div className="wheel-labels" style={{
          transform: "rotate(" + rot + "deg)",
          transitionDuration: spinSec + "s",
        }}>
          {items.map((name, i) => {
            const mid = ((i + 0.5) / items.length) * 360;
            // Sector angle from top; counter-rotate span so text stays upright.
            return (
              <div
                key={name + "-" + i}
                className="wheel-label"
                style={{ transform: "rotate(" + mid + "deg)" }}
              >
                <span style={{ transform: "rotate(" + (-mid) + "deg)" }}>{name}</span>
              </div>
            );
          })}
        </div>
        <div className="wheel-center">GO</div>
      </div>
      <div className="result">{result ? prefix + result : spinning ? "转起来…" : "点下方开始"}</div>
      <button className="btn primary" onClick={spin}
        disabled={!s.ready || !listsReady || spinning || !items.length}>
        {spinning ? "转动中" : "转一下"}
      </button>

      {showSettings ? (
        <div className="card soft stack">
          <h3 className="section-title">插件设置</h3>
          <div className="settings-grid">
            <span className="field-label">mode</span>
            <select className="select" style={{ width: 120 }} value={s.saved.mode}
              onChange={(e) => s.patchSettings({ mode: e.target.value })}>
              <option value="food">food 吃</option>
              <option value="drink">drink 喝</option>
            </select>
            <span className="field-label">spinSeconds</span>
            <input className="input" type="number" min="2" max="10" value={s.saved.spinSeconds}
              onChange={(e) => s.patchSettings({ spinSeconds: Math.max(2, +e.target.value || 2) })} />
            <span className="field-label">autoNotify</span>
            <button className={"btn" + (s.saved.autoNotify ? " primary" : "")}
              onClick={() => s.patchSettings({ autoNotify: !s.saved.autoNotify })}>
              {s.saved.autoNotify ? "开" : "关"}
            </button>
            <span className="field-label">lockMode</span>
            <button className={"btn" + (s.saved.lockMode ? " primary" : "")}
              onClick={() => s.patchSettings({ lockMode: !s.saved.lockMode })}>
              {s.saved.lockMode ? "开" : "关"}
            </button>
          </div>
        </div>
      ) : null}

      <div className="card stack">
        <div className="row">
          <input className="input grow" placeholder={mode === "food" ? "添加吃的" : "添加喝的"}
            value={draft} onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") add(); }} />
          <IconBtn className="primary" title="添加" onClick={add}><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"/></svg></IconBtn>
        </div>
        <div className="list" style={{ maxHeight: "26vh" }}>
          {items.length === 0 && <div className="empty">先加几个选项吧</div>}
          {items.map((name) => (
            <div key={name} className="item">
              <div className="grow item-title">{name}</div>
              <IconBtn className="ghost danger" title="删除"
                onClick={() => persistLists({ ...lists, [mode]: items.filter((x) => x !== name) })}>
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14M9.5 7V5.5A1.5 1.5 0 0 1 11 4h2a1.5 1.5 0 0 1 1.5 1.5V7M8 7l.7 12a1.5 1.5 0 0 0 1.5 1.4h4.6a1.5 1.5 0 0 0 1.5-1.4L17 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </IconBtn>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
