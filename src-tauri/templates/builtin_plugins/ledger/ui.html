  <script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useCallback, useMemo } = React;

async function waitCallai(timeoutMs) {
  const t0 = Date.now();
  while (Date.now() - t0 < (timeoutMs || 2500)) {
    if (window.callai && (window.callai.ready || window.callai.storage || window.callai.invoke)) {
      return window.callai;
    }
    await new Promise((r) => setTimeout(r, 40));
  }
  const mem = {};
  return {
    ready: false,
    launchParams: {},
    getLaunchParams() { return this.launchParams || {}; },
    storage: {
      async get(k) {
        if (k in mem) return mem[k];
        try {
          const raw = localStorage.getItem("callai-preview:" + k);
          return raw == null ? null : JSON.parse(raw);
        } catch (e) { return null; }
      },
      async set(k, v) {
        mem[k] = v;
        try { localStorage.setItem("callai-preview:" + k, JSON.stringify(v)); } catch (e) {}
      },
    },
    timer: {
      async now() {
        const d = new Date();
        return { iso: d.toISOString(), now: d.toISOString(), ts: d.getTime() };
      },
    },
    notification: {
      async show(a, b) {
        const title = typeof a === "string" ? a : (a && a.title) || "callai";
        const body = typeof a === "string" ? (b || "") : (a && a.body) || "";
        console.info("[notify]", title, body);
      },
    },
  };
}

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function asBool(v, fallback) {
  if (v === true || v === "1" || v === "true" || v === "yes") return true;
  if (v === false || v === "0" || v === "false" || v === "no") return false;
  return fallback;
}

function pad2(n) { return String(n).padStart(2, "0"); }

function ymd(d) {
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}

function parseYmd(s) {
  const p = String(s || "").split("-").map(Number);
  if (p.length < 3 || !p[0]) return new Date();
  return new Date(p[0], p[1] - 1, p[2], 12, 0, 0, 0);
}

function startOfWeek(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0, 0);
  const day = x.getDay(); // 0 Sun
  x.setDate(x.getDate() - day);
  return x;
}

function addDays(d, n) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0, 0);
  x.setDate(x.getDate() + n);
  return x;
}

function daysInMonth(y, m0) {
  return new Date(y, m0 + 1, 0).getDate();
}

const CURRENCIES = [
  { code: "CNY", symbol: "¥", label: "人民币 ¥" },
  { code: "USD", symbol: "$", label: "美元 $" },
  { code: "EUR", symbol: "€", label: "欧元 €" },
  { code: "GBP", symbol: "£", label: "英镑 £" },
  { code: "JPY", symbol: "円", label: "日元 円" },
  { code: "HKD", symbol: "HK$", label: "港币 HK$" },
  { code: "TWD", symbol: "NT$", label: "新台币 NT$" },
  { code: "KRW", symbol: "₩", label: "韩元 ₩" },
  { code: "SGD", symbol: "S$", label: "新币 S$" },
  { code: "AUD", symbol: "A$", label: "澳元 A$" },
  { code: "CAD", symbol: "C$", label: "加元 C$" },
  { code: "CHF", symbol: "Fr", label: "瑞郎 Fr" },
  { code: "INR", symbol: "₹", label: "印度卢比 ₹" },
  { code: "THB", symbol: "฿", label: "泰铢 ฿" },
  { code: "RUB", symbol: "₽", label: "卢布 ₽" },
  { code: "VND", symbol: "₫", label: "越南盾 ₫" },
  { code: "MYR", symbol: "RM", label: "令吉 RM" },
];
function resolveCurrency(raw) {
  const s = String(raw || "CNY").trim();
  if (!s) return CURRENCIES[0];
  const hit = CURRENCIES.find((c) => c.code === s || c.symbol === s || c.label === s);
  if (hit) return hit;
  return { code: s, symbol: s, label: s };
}
function fmtMoney(currency, n) {
  const v = Number(n) || 0;
  const abs = Math.abs(v).toFixed(2).replace(/\.00$/, "");
  const sym = resolveCurrency(currency).symbol || "¥";
  return sym + abs;
}
/** Compact amount for calendar cells */
function fmtCompact(currency, n) {
  const sym = resolveCurrency(currency).symbol || "¥";
  const v = Math.abs(Number(n) || 0);
  if (v >= 100000) return sym + Math.round(v / 10000) + "万";
  if (v >= 10000) {
    const w = (v / 10000).toFixed(1).replace(/\.0$/, "");
    return sym + w + "万";
  }
  if (Math.abs(v - Math.round(v)) < 0.005) return sym + String(Math.round(v));
  return sym + v.toFixed(0);
}

const EXPENSE_CATS = ["餐饮", "交通", "购物", "居住", "娱乐", "医疗", "学习", "其他"];
const INCOME_CATS = ["工资", "奖金", "兼职", "理财", "其他收入"];
const VIEW_OPTS = [
  { id: "day", label: "日" },
  { id: "week", label: "周" },
  { id: "month", label: "月" },
  { id: "year", label: "年" },
];

const DATA_KEY = "ledger:entries";
const SETTINGS_KEY = "settings";
const DEFAULTS = {
  view: "month",
  currency: "CNY",
  defaultCategory: "餐饮",
  showIncome: true,
};

function usePluginSettings(api, storageKey, defaults) {
  const [saved, setSaved] = useState(defaults);
  const [override, setOverride] = useState({});
  const [ready, setReady] = useState(false);

  const applyOverride = useCallback((p) => {
    setOverride(p && typeof p === "object" && !Array.isArray(p) ? p : {});
  }, []);

  useEffect(() => {
    if (!api) return;
    let alive = true;
    function alarmOnly() {
      if (api.getAlarmLaunchParams) return api.getAlarmLaunchParams() || {};
      return api.launchParams || {};
    }
    (async () => {
      const raw = (await api.storage.get(storageKey)) || {};
      if (!alive) return;
      setSaved(Object.assign({}, defaults, raw));
      applyOverride(alarmOnly());
      setReady(true);
    })();
    function onLaunch(ev) {
      const d = ev && ev.detail;
      if (d && d.alarm) applyOverride(d.alarm);
      else applyOverride(alarmOnly());
    }
    window.addEventListener("callai:launch-params", onLaunch);
    return () => {
      alive = false;
      window.removeEventListener("callai:launch-params", onLaunch);
    };
  }, [api, storageKey, applyOverride]);

  const effective = useMemo(
    () => Object.assign({}, defaults, saved, override),
    [defaults, saved, override],
  );

  const saveSettings = useCallback(async (next) => {
    const merged = Object.assign({}, defaults, next);
    setSaved(merged);
    if (api) await api.storage.set(storageKey, merged);
  }, [api, storageKey, defaults]);

  const patchSettings = useCallback(async (partial) => {
    await saveSettings(Object.assign({}, saved, partial));
  }, [saved, saveSettings]);

  return { saved, override, effective, ready, saveSettings, patchSettings };
}

function periodRange(view, cursor) {
  const y = cursor.getFullYear();
  const m = cursor.getMonth();
  const d = cursor.getDate();
  if (view === "day") {
    const s = new Date(y, m, d, 0, 0, 0, 0);
    const e = new Date(y, m, d, 23, 59, 59, 999);
    return { start: s, end: e, label: ymd(s) };
  }
  if (view === "week") {
    const s = startOfWeek(cursor);
    const e = addDays(s, 6);
    e.setHours(23, 59, 59, 999);
    return { start: s, end: e, label: ymd(s) + " ~ " + ymd(e) };
  }
  if (view === "year") {
    const s = new Date(y, 0, 1, 0, 0, 0, 0);
    const e = new Date(y, 11, 31, 23, 59, 59, 999);
    return { start: s, end: e, label: String(y) + " 年" };
  }
  const s = new Date(y, m, 1, 0, 0, 0, 0);
  const e = new Date(y, m + 1, 0, 23, 59, 59, 999);
  return { start: s, end: e, label: y + "年" + pad2(m + 1) + "月" };
}

function inRange(entry, start, end) {
  const t = parseYmd(entry.date).getTime();
  return t >= start.getTime() && t <= end.getTime();
}

function sumEntries(list) {
  let expense = 0;
  let income = 0;
  list.forEach((e) => {
    const a = Math.abs(Number(e.amount) || 0);
    if (e.type === "income") income += a;
    else expense += a;
  });
  return { expense, income, balance: income - expense };
}

function groupByDate(list) {
  const map = {};
  list.forEach((e) => {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });
  Object.keys(map).forEach((k) => {
    map[k].sort((a, b) => String(b.time || "").localeCompare(String(a.time || "")));
  });
  return Object.keys(map)
    .sort((a, b) => b.localeCompare(a))
    .map((date) => ({ date, items: map[date] }));
}

function App() {
  const [api, setApi] = useState(null);
  const [entries, setEntries] = useState([]);
  const [cursor, setCursor] = useState(() => new Date());
  const [selectedDay, setSelectedDay] = useState(() => ymd(new Date()));
  const [type, setType] = useState("expense");
  const [amount, setAmount] = useState("");
  const [category, setCategory] = useState(DEFAULTS.defaultCategory);
  const [note, setNote] = useState("");
  const [entryDate, setEntryDate] = useState(() => ymd(new Date()));
  const [entryTime, setEntryTime] = useState(() => {
    const d = new Date();
    return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
  });
  const [editingId, setEditingId] = useState(null);
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    let alive = true;
    (async () => {
      const c = await waitCallai();
      if (!alive) return;
      setApi(c);
    })();
    return () => { alive = false; };
  }, []);

  const settings = usePluginSettings(api, SETTINGS_KEY, DEFAULTS);
  const view = ["day", "week", "month", "year"].includes(settings.effective.view)
    ? settings.effective.view
    : "month";
  const currencyMeta = resolveCurrency(settings.effective.currency || "CNY");
  const currency = currencyMeta.symbol;
  const currencyCode = currencyMeta.code;
  const showIncome = asBool(settings.effective.showIncome, true);

  useEffect(() => {
    if (!settings.ready) return;
    const cat = String(settings.effective.defaultCategory || "餐饮");
    setCategory(cat);
  }, [settings.ready, settings.effective.defaultCategory]);

  useEffect(() => {
    if (!api || !settings.ready) return;
    let alive = true;
    (async () => {
      const raw = (await api.storage.get(DATA_KEY)) || [];
      if (!alive) return;
      setEntries(Array.isArray(raw) ? raw : []);
    })();
    return () => { alive = false; };
  }, [api, settings.ready]);

  const range = useMemo(() => periodRange(view, cursor), [view, cursor]);
  const periodEntries = useMemo(
    () => entries.filter((e) => inRange(e, range.start, range.end)),
    [entries, range],
  );
  const totals = useMemo(() => sumEntries(periodEntries), [periodEntries]);

  // Full ledger map so every calendar cell can show 支/收/余 (not only selected day).
  const dayMap = useMemo(() => {
    const m = {};
    entries.forEach((e) => {
      if (!e || !e.date) return;
      if (!m[e.date]) m[e.date] = { expense: 0, income: 0 };
      const a = Math.abs(Number(e.amount) || 0);
      if (e.type === "income") m[e.date].income += a;
      else m[e.date].expense += a;
    });
    Object.keys(m).forEach((k) => {
      m[k].balance = m[k].income - m[k].expense;
    });
    return m;
  }, [entries]);

  const timelineSource = useMemo(() => {
    if (view === "day") {
      return periodEntries.filter((e) => e.date === selectedDay);
    }
    if (view === "year") {
      // year timeline: by month summary as pseudo items? show latest 40 entries
      return periodEntries
        .slice()
        .sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time))
        .slice(0, 40);
    }
    return periodEntries;
  }, [view, periodEntries, selectedDay]);

  const timelineGroups = useMemo(() => groupByDate(timelineSource), [timelineSource]);

  const cats = type === "income" ? INCOME_CATS : EXPENSE_CATS;

  async function persist(next) {
    setEntries(next);
    if (api) await api.storage.set(DATA_KEY, next);
  }

  function shiftCursor(dir) {
    const d = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate(), 12, 0, 0, 0);
    if (view === "day") d.setDate(d.getDate() + dir);
    else if (view === "week") d.setDate(d.getDate() + dir * 7);
    else if (view === "year") d.setFullYear(d.getFullYear() + dir);
    else d.setMonth(d.getMonth() + dir);
    setCursor(d);
    setSelectedDay(ymd(d));
  }

  function goToday() {
    const now = new Date();
    setCursor(now);
    setSelectedDay(ymd(now));
    setEntryDate(ymd(now));
  }

  async function setView(v) {
    await settings.patchSettings({ view: v });
  }

  function startEdit(e) {
    setEditingId(e.id);
    setType(e.type === "income" ? "income" : "expense");
    setAmount(String(Math.abs(Number(e.amount) || 0)));
    setCategory(e.category || DEFAULTS.defaultCategory);
    setNote(e.note || "");
    setEntryDate(e.date);
    setEntryTime(e.time || "12:00");
  }

  function resetForm() {
    setEditingId(null);
    setAmount("");
    setNote("");
    setType("expense");
    setCategory(String(settings.effective.defaultCategory || "餐饮"));
    setEntryDate(selectedDay || ymd(new Date()));
    const d = new Date();
    setEntryTime(pad2(d.getHours()) + ":" + pad2(d.getMinutes()));
  }

  async function saveEntry() {
    const a = Math.abs(parseFloat(String(amount).replace(/,/g, "")));
    if (!a || Number.isNaN(a)) return;
    setBusy(true);
    try {
      const row = {
        id: editingId || uid(),
        amount: Math.round(a * 100) / 100,
        type: type === "income" ? "income" : "expense",
        category: category || (type === "income" ? "其他收入" : "其他"),
        note: String(note || "").trim(),
        date: entryDate || ymd(new Date()),
        time: entryTime || "12:00",
        createdAt: new Date().toISOString(),
      };
      let next;
      if (editingId) {
        next = entries.map((e) => (e.id === editingId ? Object.assign({}, e, row) : e));
      } else {
        next = [row].concat(entries);
      }
      await persist(next);
      if (api && api.notification && settings.effective) {
        // optional soft notify only when user saved and notifications allowed via host
      }
      resetForm();
      setSelectedDay(row.date);
      setCursor(parseYmd(row.date));
    } finally {
      setBusy(false);
    }
  }

  async function removeEntry(id) {
    if (!id) return;
    if (!window.confirm("删除这条账目？")) return;
    setBusy(true);
    try {
      await persist(entries.filter((e) => e.id !== id));
      if (editingId === id) resetForm();
    } finally {
      setBusy(false);
    }
  }

  const calCells = useMemo(() => {
    if (view === "year") return null;
    if (view === "week") {
      const s = startOfWeek(cursor);
      return Array.from({ length: 7 }, (_, i) => addDays(s, i));
    }
    // month / day: full month grid
    const y = cursor.getFullYear();
    const m = cursor.getMonth();
    const first = new Date(y, m, 1, 12, 0, 0, 0);
    const startPad = first.getDay();
    const dim = daysInMonth(y, m);
    const cells = [];
    for (let i = 0; i < startPad; i++) {
      cells.push(addDays(first, i - startPad));
    }
    for (let d = 1; d <= dim; d++) {
      cells.push(new Date(y, m, d, 12, 0, 0, 0));
    }
    while (cells.length % 7 !== 0) {
      const last = cells[cells.length - 1];
      cells.push(addDays(last, 1));
    }
    return cells;
  }, [view, cursor]);

  const monthMarks = useMemo(() => {
    if (view !== "year") return null;
    const y = cursor.getFullYear();
    return Array.from({ length: 12 }, (_, m0) => {
      const s = new Date(y, m0, 1, 0, 0, 0, 0);
      const e = new Date(y, m0 + 1, 0, 23, 59, 59, 999);
      const list = entries.filter((x) => inRange(x, s, e));
      const t = sumEntries(list);
      return { m0, label: m0 + 1 + "月", expense: t.expense, income: t.income, count: list.length };
    });
  }, [view, cursor, entries]);

  if (!api || !settings.ready) {
    return <div className="loading">小岛在翻账本…</div>;
  }

  const todayStr = ymd(new Date());

  return (
    <div className="app">
      <header className="header row wrap">
        <div className="grow">
          <h1>小岛记账</h1>
          <p>日历 · 时间线 · 分类汇总。币种默认人民币，可在记一笔卡片内切换。</p>
        </div>
        <span className="tag">{view}</span>
      </header>

      <div className="card stack">
        <div className="row" style={{ justifyContent: "space-between" }}>
          <strong style={{ color: "var(--text)", fontWeight: 900 }}>
            {editingId ? "编辑账目" : "记一笔"}
          </strong>
          {editingId ? (
            <button type="button" className="btn sm ghost" onClick={resetForm}>取消</button>
          ) : null}
        </div>

        <div className="seg">
          <button type="button" className={type === "expense" ? "on" : ""} onClick={() => {
            setType("expense");
            setCategory(String(settings.effective.defaultCategory || "餐饮"));
          }}>支出</button>
          {showIncome ? (
            <button type="button" className={type === "income" ? "on" : ""} onClick={() => {
              setType("income");
              setCategory("工资");
            }}>收入</button>
          ) : null}
        </div>

        <div className="form-grid">
          <div className="amount-field">
            <input
              className="input amount-input"
              inputMode="decimal"
              placeholder="金额"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
            />
            <span className="amount-unit" title={currencyMeta.label}>{currency}</span>
          </div>
          <input
            className="input"
            type="time"
            value={entryTime}
            onChange={(e) => setEntryTime(e.target.value)}
          />
          <input
            className="input full"
            type="date"
            value={entryDate}
            onChange={(e) => setEntryDate(e.target.value)}
          />
          <input
            className="input full"
            placeholder="备注（可选）"
            value={note}
            onChange={(e) => setNote(e.target.value)}
          />
        </div>

        <div className="cat-row">
          {cats.map((c) => (
            <button
              key={c}
              type="button"
              className={"cat-chip" + (category === c ? " on" : "")}
              onClick={() => setCategory(c)}
            >
              {c}
            </button>
          ))}
        </div>

        <button type="button" className="btn primary" disabled={busy} onClick={saveEntry}>
          {editingId ? "保存修改" : "记入账本"}
        </button>

        <div className="settings-row">
          <label htmlFor="ledger-currency">记账币种（settings / ENV: currency）</label>
          <select
            id="ledger-currency"
            className="select"
            value={currencyCode}
            onChange={(e) => settings.patchSettings({ currency: e.target.value })}
          >
            {CURRENCIES.map((c) => (
              <option key={c.code} value={c.code}>{c.label}</option>
            ))}
          </select>
        </div>
      </div>

      <div className="card soft stack">
        <div className="seg">
          {VIEW_OPTS.map((v) => (
            <button
              key={v.id}
              type="button"
              className={view === v.id ? "on" : ""}
              onClick={() => setView(v.id)}
            >
              {v.label}
            </button>
          ))}
        </div>

        <div className="nav-period">
          <button type="button" className="btn icon ghost" title="上一段" onClick={() => shiftCursor(-1)}>‹</button>
          <div className="title">{range.label}</div>
          <button type="button" className="btn icon ghost" title="下一段" onClick={() => shiftCursor(1)}>›</button>
          <button type="button" className="btn sm ghost" onClick={goToday}>今天</button>
        </div>

        <div className="summary">
          <div className="sum-cell exp">
            <div className="lab">支出</div>
            <div className="val">{fmtMoney(currencyCode, totals.expense)}</div>
          </div>
          <div className="sum-cell inc">
            <div className="lab">收入</div>
            <div className="val">{fmtMoney(currencyCode, totals.income)}</div>
          </div>
          <div className="sum-cell bal">
            <div className="lab">结余</div>
            <div className="val">{fmtMoney(currencyCode, totals.balance)}</div>
          </div>
        </div>
      </div>

      <div className="card stack">
        <div className="row" style={{ justifyContent: "space-between" }}>
          <strong style={{ color: "var(--text)", fontWeight: 900 }}>
            {view === "year" ? "月份总览" : "日历"}
          </strong>
          <span className="meta">{periodEntries.length} 笔 · {currencyMeta.label}</span>
        </div>

        {view === "year" ? (
          <div className="year-grid">
            {(monthMarks || []).map((mm) => (
              <button
                key={mm.m0}
                type="button"
                className={"year-cell" + (cursor.getMonth() === mm.m0 ? " on" : "")}
                onClick={() => {
                  const d = new Date(cursor.getFullYear(), mm.m0, 1, 12, 0, 0, 0);
                  setCursor(d);
                  setSelectedDay(ymd(d));
                  setView("month");
                }}
              >
                <div className="m">{mm.label}</div>
                <div className="a">
                  {mm.count ? ("支 " + fmtMoney(currencyCode, mm.expense)) : "—"}
                </div>
              </button>
            ))}
          </div>
        ) : (
          <div className="cal">
            {["日", "一", "二", "三", "四", "五", "六"].map((w) => (
              <div key={w} className="dow">{w}</div>
            ))}
            {(calCells || []).map((d) => {
              const key = ymd(d);
              const inMonth = d.getMonth() === cursor.getMonth();
              const mark = dayMap[key];
              const isSel = key === selectedDay;
              const isToday = key === todayStr;
              const exp = mark ? mark.expense : 0;
              const inc = mark ? mark.income : 0;
              const bal = mark ? mark.balance : 0;
              const hasMoney = exp > 0 || inc > 0;
              // Always paint 支/收/余 on days with ledger data (selected or not).
              return (
                <button
                  key={key + String(inMonth)}
                  type="button"
                  className={
                    "cell" +
                    (inMonth || view === "week" ? "" : " muted") +
                    (isToday ? " today" : "") +
                    (isSel ? " on" : "") +
                    (hasMoney ? " has-money" : "")
                  }
                  title={
                    hasMoney
                      ? "支出 " + fmtMoney(currencyCode, exp) +
                        " · 收入 " + fmtMoney(currencyCode, inc) +
                        " · 结余 " + fmtMoney(currencyCode, bal)
                      : key
                  }
                  onClick={() => {
                    setSelectedDay(key);
                    setCursor(d);
                    setEntryDate(key);
                  }}
                >
                  <span className="day-num">{d.getDate()}</span>
                  {hasMoney ? (
                    <span className="cell-sums" aria-hidden={false}>
                      <span className="cell-exp">
                        <span className="cell-lab">支</span>
                        {exp > 0 ? "-" + fmtCompact(currencyCode, exp) : "—"}
                      </span>
                      <span className="cell-inc">
                        <span className="cell-lab">收</span>
                        {inc > 0 ? "+" + fmtCompact(currencyCode, inc) : "—"}
                      </span>
                      <span className="cell-bal">
                        <span className="cell-lab">余</span>
                        {fmtCompact(currencyCode, bal)}
                      </span>
                    </span>
                  ) : null}
                </button>
              );
            })}
          </div>
        )}
      </div>

      <div className="card stack">
        <div className="row" style={{ justifyContent: "space-between" }}>
          <strong style={{ color: "var(--text)", fontWeight: 900 }}>时间线</strong>
          <span className="meta">
            {view === "day" ? selectedDay : "按日纵向排列"}
          </span>
        </div>
        {timelineGroups.length === 0 ? (
          <div className="empty">这段时间还没有账目，记一笔吧～</div>
        ) : (
          <div className="timeline">
            {timelineGroups.map((g) => {
              const d = parseYmd(g.date);
              return (
                <div key={g.date} className="tl-day">
                  <div className="tl-rail">
                    <div className="tl-date">
                      <span className="d">{d.getDate()}</span>
                      {pad2(d.getMonth() + 1)}月
                    </div>
                    <div className="tl-line" />
                  </div>
                  <div className="tl-items">
                    {g.items.map((e) => (
                      <div key={e.id} className="tl-item">
                        <div>
                          <div className="name">
                            <span className={"tag " + (e.type === "income" ? "inc" : "exp")}>
                              {e.category}
                            </span>{" "}
                            {e.note || (e.type === "income" ? "收入" : "支出")}
                          </div>
                          <div className="sub">
                            {e.time || "--:--"} · {e.date}
                          </div>
                          <div className="tl-actions">
                            <button type="button" className="btn sm ghost" onClick={() => startEdit(e)}>编辑</button>
                            <button type="button" className="btn sm danger" onClick={() => removeEntry(e.id)}>删</button>
                          </div>
                        </div>
                        <div className={"amt " + (e.type === "income" ? "inc" : "exp")}>
                          {(e.type === "income" ? "+" : "-") + fmtMoney(currencyCode, e.amount)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <p className="meta" style={{ textAlign: "center" }}>
        数据在插件 storage。ENV 可覆盖 view / currency / defaultCategory / showIncome。
      </p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
