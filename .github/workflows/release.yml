name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: publish (${{ matrix.name }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
            cli_bin: callai
            cli_asset: callai-cli-aarch64-apple-darwin
          - name: macos-x86_64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
            cli_bin: callai
            cli_asset: callai-cli-x86_64-apple-darwin
          - name: linux-x86_64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
            cli_bin: callai
            cli_asset: callai-cli-x86_64-unknown-linux-gnu
          - name: windows-x86_64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
            cli_bin: callai.exe
            cli_asset: callai-cli-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-${{ matrix.name }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for createUpdaterArtifacts / updater signatures
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: callai ${{ needs.release-please.outputs.tag_name }}
          releaseBody: |
            Desktop + CLI builds for this version.
            Auto-update artifacts (`.sig` + `latest.json`) are published when signing secrets are configured.
            See assets below and CHANGELOG.md.

            ### First launch (unsigned builds)
            - **macOS**: `xattr -cr /Applications/callai.app` then open, or right-click → Open
            - **Windows**: SmartScreen → More info → Run anyway
            - **Linux**: `chmod +x` AppImage if needed
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
          projectPath: .
          tauriScript: bunx tauri
          # tauri-action uploads updater JSON as latest.json when updater enabled
          updaterJsonPreferNsis: true

      - name: Build CLI (release)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.tauri_args }}" ]]; then
            cargo build --manifest-path src-tauri/Cargo.toml --release --target ${{ matrix.rust_target }}
            SRC="src-tauri/target/${{ matrix.rust_target }}/release/${{ matrix.cli_bin }}"
          else
            cargo build --manifest-path src-tauri/Cargo.toml --release
            SRC="src-tauri/target/release/${{ matrix.cli_bin }}"
          fi
          mkdir -p dist-cli
          cp -f "$SRC" "dist-cli/${{ matrix.cli_asset }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "dist-cli/${{ matrix.cli_asset }}"
          fi
          ls -la dist-cli/

      - name: Upload CLI to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist-cli/${{ matrix.cli_asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
