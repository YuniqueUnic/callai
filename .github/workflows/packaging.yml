name: Packaging

on:
  push:
    branches: [main]
    paths:
      - "packaging/**"
      - ".github/workflows/packaging.yml"
  pull_request:
    branches: [main]
    paths:
      - "packaging/**"
      - ".github/workflows/packaging.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag to regenerate manifests (e.g. v0.2.1)"
        required: false
        default: ""

concurrency:
  group: packaging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: packaging-validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate manifests
        run: ./packaging/scripts/validate_manifests.sh

  regenerate:
    name: packaging-regenerate
    if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup GitHub CLI
        run: gh --version

      - name: Regenerate from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./packaging/scripts/generate_from_release.sh "${{ inputs.tag }}"
          ./packaging/scripts/validate_manifests.sh

      - name: Upload manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaging-manifests-${{ inputs.tag }}
          path: packaging/
